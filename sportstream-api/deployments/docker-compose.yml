version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - APP_ENV=production
      - APP_VERSION=1.0.0
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    restart: unless-stopped
